name: neuroflow
description: ADHD/ADD habit, routine, and executive-function companion.
version: 0.1.0+1

environment:
  sdk: '>=3.4.0 <4.0.0'
  flutter: '>=3.22.0'

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Local database (Drift / SQLite)
  drift: ^2.18.0
  sqlite3_flutter_libs: ^0.5.20
  path_provider: ^2.1.3
  path: ^1.9.0

  # Notifications & background
  flutter_local_notifications: ^17.1.2
  timezone: ^0.9.3
  workmanager: ^0.5.2

  # Google Tasks sync
  google_sign_in: ^6.2.1
  googleapis: ^13.1.0

  # Authenticated http.Client seam for GoogleApiFactory (Google Foundation
  # Sprint) — already resolved transitively via google_sign_in/googleapis at
  # 2.0.2 (see pubspec.lock); declared directly here since
  # lib/platform/google/ and lib/platform/sync/ import it directly.
  http: ^2.0.2

  # Secure storage (tokens, sensitive prefs — §2.8)
  flutter_secure_storage: ^9.2.1

  # OCR capture
  google_mlkit_text_recognition: ^0.13.0

  # IDs
  uuid: ^4.4.0

  # NOTE: Two pieces intentionally have no stable package yet:
  #   1. On-device LLM / Lexi (Gemini Nano on Android) — no stable Flutter binding
  #   2. Local NLP date parsing — no production-ready Flutter package
  # Both are Phase 2 / §14 items. Stubs are in executive/planner.dart.

dev_dependencies:
  flutter_test:
    sdk: flutter
  # drift_dev capped at 2.28.2 (NOT the true pub.dev latest, 2.34.2+1) —
  # drift_dev >=2.29.0 requires drift >=2.29.0, which would force the
  # `drift: ^2.18.0` runtime dependency above to resolve past its current
  # lockfile version (2.28.2) ahead of Stage 2. See ADR-006 Modernization
  # Sprint Stage 1 entry in DECISIONS.md.
  drift_dev: ^2.28.2
  build_runner: ^2.15.0
  # riverpod_generator capped at 2.6.5, the last 2.x release (NOT the true
  # pub.dev latest, 4.0.4) — every riverpod_generator 3.x/4.x release pins
  # an EXACT riverpod_annotation version (3.0.0 / 4.0.3 respectively), which
  # would force the `riverpod_annotation: ^2.3.5` / `flutter_riverpod: ^2.5.1`
  # runtime pins above past this stage's scope. See DECISIONS.md Stage 1 entry.
  riverpod_generator: ^2.6.5
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
