name: neuroflow
description: ADHD/ADD habit, routine, and executive-function companion.
version: 0.1.0-alpha.5+5

environment:
  sdk: '>=3.4.0 <4.0.0'
  flutter: '>=3.22.0'

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^3.0.0
  riverpod_annotation: ^4.0.0

  # Local database (Drift / SQLite)
  drift: ^2.18.0
  sqlite3_flutter_libs: ^0.5.20
  path_provider: ^2.1.3
  path: ^1.9.0

  # Notifications & background
  flutter_local_notifications: ^17.1.2
  timezone: ^0.9.3
  workmanager: ^0.9.0+3

  # Google Tasks sync
  google_sign_in: ^7.0.0
  googleapis: ^16.0.0
  http: ^1.2.0

  # Secure storage (tokens, sensitive prefs — §2.8)
  flutter_secure_storage: ^9.2.1

  # OCR capture
  google_mlkit_text_recognition: ^0.13.0

  # IDs
  uuid: ^4.4.0

  # NOTE: Two pieces intentionally have no stable package yet:
  #   1. On-device LLM / Lexi (Gemini Nano on Android) — no stable Flutter binding
  #   2. Local NLP date parsing — no production-ready Flutter package
  # Both are Phase 2 / §14 items. Stubs are in executive/planner.dart.

  firebase_core: ^4.11.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  drift_dev: ">=2.28.2"
  build_runner: ">=2.15.0"
  riverpod_generator: ^4.0.0
  flutter_lints: ^6.0.0
  sqlite3: ^2.9.4

flutter:
  uses-material-design: true
  assets:
    - assets/lexi/public/
