# .github/workflows/android-ci.yml
#
# Android-only CI — runs on every push and pull-request to main.
# Steps:
#   1. flutter pub get
#   2. dart run build_runner build (generates Drift .g.dart files)
#   3. flutter test
#   4. flutter build apk --release (push-only, produces artifact)
#
# Requires Flutter >= 3.44.0 / Dart >= 3.12.0 (matches pubspec.lock resolved SDKs).

name: Android CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    name: Build & Test (Android)
    runs-on: ubuntu-latest

    # google-services.json is not committed (contains the Firebase API key).
    # Add it as a repo secret named GOOGLE_SERVICES_JSON to enable the release
    # APK build; without it the apk step is skipped so main stays green.
    env:
      GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.6'
          channel: stable
          cache: true

      - name: Accept Android SDK licenses
        run: yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses || true

      - name: Install dependencies
        run: flutter pub get

      - name: Generate Drift & Riverpod code
        run: dart run build_runner build --delete-conflicting-outputs -d

      - name: Run Flutter tests
        run: flutter test

      - name: Restore google-services.json
        if: github.event_name == 'push' && env.GOOGLE_SERVICES_JSON != ''
        run: |
          mkdir -p android/app
          printf '%s' "$GOOGLE_SERVICES_JSON" > android/app/google-services.json

      - name: Build release APK
        if: github.event_name == 'push' && env.GOOGLE_SERVICES_JSON != ''
        run: flutter build apk --release

      - name: Upload APK artifact
        if: github.event_name == 'push' && env.GOOGLE_SERVICES_JSON != ''
        uses: actions/upload-artifact@v4
        with:
          name: neuroflow-release-apk
          path: build/outputs/flutter-apk/app-release.apk
          retention-days: 14
