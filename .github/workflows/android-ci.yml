# .github/workflows/android-ci.yml
#
# Android-only CI — runs on every push and pull-request to main.
# Steps:
#   1. flutter pub get
#   2. dart run build_runner build (generates Drift .g.dart files)
#   3. flutter test
#   4. flutter build apk --release (push-only, produces artifact)
#
# Requires Flutter >= 3.32.0 / Dart >= 3.8.0 — flutter_lints ^6.0.0 (dev_dependency)
# pins to Dart SDK ^3.8.0, which is stricter than pubspec.yaml's own
# `environment.sdk: '>=3.4.0 <4.0.0'`. Pinned below to the current stable
# release so this stays comfortably ahead of that floor.

name: Android CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    name: Build & Test (Android)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.4'
          channel: stable
          cache: true

      - name: Accept Android SDK licenses
        run: yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses || true

      - name: Install dependencies
        run: flutter pub get

      - name: Generate Drift & Riverpod code
        run: dart run build_runner build --delete-conflicting-outputs -d

      - name: Run Flutter tests
        run: flutter test

      - name: Build release APK
        if: github.event_name == 'push'
        run: flutter build apk --release

      - name: Upload APK artifact
        if: github.event_name == 'push'
        uses: actions/upload-artifact@v4
        with:
          name: neuroflow-release-apk
          path: build/outputs/flutter-apk/app-release.apk
          retention-days: 14
